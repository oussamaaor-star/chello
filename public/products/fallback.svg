<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <rect width="400" height="500" fill="#faf8f4"/>

  <!-- Minimal garment hanger (fashion placeholder) -->
  <g transform="translate(200, 215)" fill="none" stroke="#a8a29e" stroke-opacity="0.5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- hook -->
    <path d="M0 -60 q0 -16 -14 -16 q-12 0 -12 11"/>
    <!-- hanger bar -->
    <path d="M0 -60 L-74 -6 q-6 5 2 5 L72 -1 q8 0 2 -5 Z"/>
  </g>

  <!-- Divider -->
  <line x1="150" y1="330" x2="250" y2="330" stroke="#d6d3d1" stroke-width="1" stroke-opacity="0.7"/>

  <!-- Brand wordmark -->
  <text x="200" y="362"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="15"
    fill="#78716c"
    fill-opacity="0.65"
    text-anchor="middle"
    letter-spacing="6">
    CHELLO
  </text>
</svg>
